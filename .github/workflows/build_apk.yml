name: Flutter Build Optimized APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # الخطوة السحرية لتصغير الحجم: تنظيف أي مخلفات سابقة وبناء نسخة مجزأة
      - name: Build Optimized APK
        run: |
          flutter clean
          flutter pub get
          # بناء APK مقسم حسب نوع المعالج (Split per ABI) لتصغير الحجم
          # واستخدام --obfuscate لتشفير الكود وتقليل حجمه
          flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols --no-tree-shake-icons

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: optimized-apks
          # هنا سيقوم برفع النسخ الثلاث (v7, v8, x86) لتختار ما يناسبك
          path: build/app/outputs/flutter-apk/*.apk